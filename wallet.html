<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - EASY EARNING ZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --pink: #ff1493; --yellow: #ffd700; --red: #E4002B; --bg: #fffdf0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); }
        .gradient-card { background: linear-gradient(135deg, var(--pink), var(--red)); }
        .method-card { border: 2px solid transparent; transition: 0.3s; }
        .method-card.active { border-color: var(--pink); background: #fff1f8; }
    </style>
</head>
<body class="pb-24">

    <header class="p-5 flex items-center gap-4 bg-white shadow-sm sticky top-0 z-50">
        <a href="index.html" class="text-gray-600 text-xl"><i class="fa fa-arrow-left"></i></a>
        <h1 class="text-xl font-bold text-gray-800">আমার ওয়ালেট</h1>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="gradient-card p-6 rounded-3xl text-white shadow-lg mb-6 relative overflow-hidden">
            <div class="relative z-10">
                <p class="opacity-80 text-sm">মোট ব্যালেন্স</p>
                <h2 class="text-4xl font-black mt-1">৳ <span id="balance">0.00</span></h2>
            </div>
            <i class="fa fa-wallet absolute -right-4 -bottom-4 text-white/20 text-8xl"></i>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-700 mb-4"><i class="fa fa-money-bill-transfer text-pink-500 mr-2"></i>টাকা উত্তোলন করুন</h3>
            
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div onclick="selectMethod('Bkash', this)" class="method-card p-3 rounded-xl bg-gray-50 text-center cursor-pointer">
                        <img src="https://myearningzone.com/photos/recharge.jpg" class="w-10 h-10 mx-auto rounded-lg mb-1 object-cover">
                        <span class="text-[10px] font-bold">বিকাশ</span>
                    </div>
                    <div onclick="selectMethod('Nagad', this)" class="method-card p-3 rounded-xl bg-gray-50 text-center cursor-pointer">
                        <img src="https://myearningzone.com/photos/ofar.jpg" class="w-10 h-10 mx-auto rounded-lg mb-1 object-cover">
                        <span class="text-[10px] font-bold">নগদ</span>
                    </div>
                    <div onclick="selectMethod('Rocket', this)" class="method-card p-3 rounded-xl bg-gray-50 text-center cursor-pointer">
                        <img src="https://myearningzone.com/photos/like.jpg" class="w-10 h-10 mx-auto rounded-lg mb-1 object-cover">
                        <span class="text-[10px] font-bold">রকেট</span>
                    </div>
                </div>

                <input type="number" id="withdrawAmount" placeholder="পরিমাণ (৳)" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-pink-500 text-lg font-bold">
                
                <input type="tel" id="accountNumber" placeholder="অ্যাকাউন্ট নাম্বার" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:border-pink-500">

                <button onclick="requestWithdraw()" id="withdrawBtn" class="w-full py-4 bg-[#E4002B] text-white font-extrabold rounded-xl shadow-lg active:scale-95 transition">
                    উত্তোলন রিকোয়েস্ট পাঠান
                </button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="font-bold text-gray-700 mb-3 ml-1">সাম্প্রতিক ট্রানজেকশন</h3>
            <div id="historyList" class="space-y-3">
                <p class="text-center text-gray-400 text-sm py-5">কোন ট্রানজেকশন পাওয়া যায়নি</p>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://apnzwgrupifhmifqbndu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Diosdxt2gvWcbb07LGYzLg_j6DM7Txn";
        
        let selectedMethod = "";
        let userBalance = 0;
        const userPhone = localStorage.getItem('userPhone');

        // Load Wallet Data
        async function loadWallet() {
            if (!userPhone) { window.location.href = "login.html"; return; }

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?phone=eq.${userPhone}`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const data = await res.json();
                if (data.length > 0) {
                    // ব্যালেন্স আপনার টেবিলের কলাম অনুযায়ী হবে। আমি 'balance' কলাম ধরে করছি।
                    userBalance = data[0].balance || 0; 
                    document.getElementById('balance').innerText = userBalance.toFixed(2);
                }
            } catch (e) { console.error(e); }
        }

        function selectMethod(method, el) {
            selectedMethod = method;
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        async function requestWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const account = document.getElementById('accountNumber').value;
            const btn = document.getElementById('withdrawBtn');

            if (!selectedMethod) { alert("পেমেন্ট মেথড সিলেক্ট করুন!"); return; }
            if (isNaN(amount) || amount < 50) { alert("সর্বনিম্ন ৫০ টাকা উত্তোলন করা যাবে!"); return; }
            if (amount > userBalance) { alert("আপনার পর্যাপ্ত ব্যালেন্স নেই!"); return; }
            if (account.length < 11) { alert("সঠিক অ্যাকাউন্ট নাম্বার দিন!"); return; }

            btn.disabled = true;
            btn.innerText = "প্রসেসিং...";

            // Withdraw Request Supabase-এ সেভ করা
            // দ্রষ্টব্য: আপনার Supabase-এ 'withdraw_requests' নামে একটি টেবিল থাকতে হবে।
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/withdraw_requests`, {
                    method: "POST",
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({
                        phone: userPhone,
                        method: selectedMethod,
                        amount: amount,
                        account_number: account,
                        status: "Pending"
                    })
                });

                if (res.ok) {
                    alert("আপনার রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে। ২৪ ঘন্টার মধ্যে পেমেন্ট পাবেন ইনশাআল্লাহ।");
                    location.reload();
                } else {
                    alert("সার্ভার সমস্যা! পরে চেষ্টা করুন।");
                }
            } catch (e) {
                alert("ইন্টারনেট সমস্যা!");
            } finally {
                btn.disabled = false;
                btn.innerText = "উত্তোলন রিকোয়েস্ট পাঠান";
            }
        }

        window.onload = loadWallet;
    </script>
</body>
      </html>
